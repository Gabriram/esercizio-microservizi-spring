version: "3.8"

services:
  garage:
    build:
      context: ./garage
      dockerfile: Dockerfile.garage
    ports:
      - "8083:8080"
    environment:
      - SERVER_PORT=8083
      - SERVER_ADDRESS=0.0.0.0
    restart: always

  cars:
    build:
      context: ./cars
      dockerfile: Dockerfile.cars
    ports:
      - "8082:8080"
    environment:
      - SERVER_PORT=8082
      - SERVER_ADDRESS=0.0.0.0
    restart: always

  bike:
    build:
      context: ./bike
      dockerfile: Dockerfile.bike
    ports:
      - "8083:8080"
    environment:
      - SERVER_PORT=8083
      - SERVER_ADDRESS=0.0.0.0
    restart: always
