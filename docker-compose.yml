version: '3.8'

services:

  garage:
    build:
      context: ./garage
      dockerfile: Dockerfile.garage
    ports:
      - "8081:8081"
    restart: always

  cars:
    build:
      context: ./cars
      dockerfile: Dockerfile.cars
    ports:
      - "8082:8082"
    restart: always

  bike:
    build:
      context: ./bike
      dockerfile: Dockerfile.bike
    ports:
      - "8083:8083"
    restart: always