spring.application.name=bikes-service
server:
    port: 3306

spring:
    application:
        name: bikes
    datasource:
        url: jdbc:mariadb://localhost:3306/bikesdb
        username: root
        password:
    jpa:
            ddl-auto: update
        show-sql: true
        properties:
            hibernate:
                format_sql: true
                dialect: org.hibernate.dialect.MariaDBDialect